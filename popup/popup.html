<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>SET Thailand Stock Analyzer</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <div class="logo-mark">฿</div>
      <div class="logo-text">
        <span class="logo-title">SET Thailand</span>
        <span class="logo-sub">Stock Analyzer</span>
      </div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </header>

  <div class="search-section">
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">⌕</span>
        <input id="symbolInput" type="text" placeholder="e.g. TOP, PTT, KBANK…"
          maxlength="10" autocomplete="off" spellcheck="false" />
      </div>
      <button id="searchBtn" class="search-btn">Analyze</button>
    </div>
    <div class="quick-symbols">
      <span class="chip" data-sym="TOP">TOP</span>
      <span class="chip" data-sym="BDMS">BDMS</span>
      <span class="chip" data-sym="PTT">PTT</span>
      <span class="chip" data-sym="CPALL">CPALL</span>
      <span class="chip" data-sym="SCB">SCB</span>
      <span class="chip" data-sym="KBANK">KBANK</span>
      <span class="chip" data-sym="AOT">AOT</span>
      <span class="chip" data-sym="BH">BH</span>
    </div>
  </div>

  <!-- States -->
  <div id="emptyState" class="empty-state">
    <div class="empty-icon">📈</div>
    <p>Enter a SET symbol to begin</p>
  </div>

  <div id="loadingState" class="loading-state" style="display:none">
    <div class="loader"><span></span><span></span><span></span></div>
    <p>Fetching market data…</p>
  </div>

  <div id="errorState" class="error-state" style="display:none"></div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none">
    <div class="company-hero" id="companyHero"></div>
    <div class="stat-row" id="statRow"></div>
    <div class="tabs">
      <button class="tab active" data-tab="chart">Chart</button>
      <button class="tab" data-tab="financials">Financials</button>
      <button class="tab" data-tab="holders">Holders</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="profile">Profile</button>
      <button class="tab" data-tab="debug">Debug</button>
    </div>
    <div id="tabContent" class="tab-content"></div>
  </div>

  <!-- ── Activity Log — always visible after first search ── -->
  <div id="logWrap" style="display:none">
    <div class="log-header">
      <span class="log-title">▸ Activity Log</span>
      <button id="clearLogBtn" class="log-clear">Clear</button>
    </div>
    <div id="logPanel" class="log-panel"></div>
  </div>

</div>
<script src="chart.umd.js"></script>
<script src="popup.js"></script>
</body>
</html>
